services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: praxis_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-praxislsdata}
      POSTGRES_USER: ${DB_USER:-praxis-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      # loopback only — never expose Postgres to the public interface
      - "127.0.0.1:5432:5432"
    volumes:
      - praxis_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: praxis_redis
    ports:
      # loopback only — never expose Redis to the public interface
      - "127.0.0.1:6379:6379"
    volumes:
      - praxis_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: runs platform + all-tenant migrations, then exits. api/worker wait
  # for it, so a plain `docker compose up -d` is always schema-current — on the
  # first boot AND on every update. Migrations are tracked per file (re-running
  # is a no-op) and `db:migrate:tenants` with zero tenants is a no-op too.
  migrate:
    build:
      context: .
      target: runtime
    depends_on:
      postgres: { condition: service_healthy }
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      # the migrator/provisioner connects via TENANT_DB_HOST_DEFAULT (falls back
      # to localhost, NOT DB_HOST) — it must also point at the postgres service
      TENANT_DB_HOST_DEFAULT: postgres
      REDIS_URL: redis://redis:6379
    command: sh -c "npm run db:migrate:platform && npm run db:migrate:tenants"
    restart: "no"

  api:
    build:
      context: .
      target: runtime
    container_name: praxis-ls
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    # These override the LOCAL values in .env so the same .env works for both
    # `npm run dev` (localhost) and `docker compose up` (service DNS names).
    # The code reads REDIS_URL (not REDIS_HOST — that var is dead/ignored).
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      TENANT_DB_HOST_DEFAULT: postgres
      REDIS_URL: redis://redis:6379
      PORT: "8080"
      ENABLE_WORKERS: "false"
    ports:
      - "3000:8080"   # host:container — app listens on 8080 inside the container
    volumes:
      - ./media:/app/media
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      # STORAGE_LOCAL_PATH=./data/vault — the document vault MUST persist across
      # container rebuilds or every uploaded/rendered document is lost.
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  # Hot-standby copy of the api on host port 3001. nginx lists it as `backup`,
  # so it receives traffic ONLY while the primary is down — which is exactly the
  # window during a rolling deploy (scripts/deploy.sh restarts standby first,
  # then the primary). Keeping it backup-only also keeps all socket.io clients
  # on one instance (no cross-instance emit fan-out exists).
  api-standby:
    build:
      context: .
      target: runtime
    container_name: praxis-ls-standby
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      TENANT_DB_HOST_DEFAULT: postgres
      REDIS_URL: redis://redis:6379
      PORT: "8080"
      ENABLE_WORKERS: "false"
    ports:
      - "127.0.0.1:3001:8080"
    volumes:
      - ./media:/app/media
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  worker:
    build:
      context: .
      target: worker
    container_name: praxis_worker
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      TENANT_DB_HOST_DEFAULT: postgres
      REDIS_URL: redis://redis:6379
    volumes:
      - ./media:/app/media
      - ./uploads:/app/uploads
      - ./logs:/app/logs
      - ./data:/app/data

volumes:
  praxis_pgdata:
  praxis_redisdata:
