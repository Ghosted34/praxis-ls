# Deploy — SSH rolling deploy to the production VPS.
#
# Triggers after the CI workflow SUCCEEDS on main (never deploys a red build),
# or manually via workflow_dispatch. The server does the actual work in
# scripts/deploy.sh: build → migrate → roll standby → roll primary → worker.
# nginx's backup upstream (praxis-ls-standby on :3001) absorbs traffic while
# the primary restarts, so the reload is effectively zero-downtime.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DEPLOY_HOST      server IP or hostname        e.g. 51.254.165.120
#   DEPLOY_USER      ssh user                     e.g. root
#   DEPLOY_SSH_KEY   PRIVATE key (openssh format) whose public half is in
#                    ~/.ssh/authorized_keys on the server
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Rolling deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/praxis-ls
            bash scripts/deploy.sh
